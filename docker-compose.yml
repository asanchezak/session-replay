services:
  seq:
    image: datalust/seq:latest
    container_name: sr-logs
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "8082:80"    # Web UI
      - "5341:5341"  # Ingestion API
    volumes:
      - seq-data:/data
    restart: unless-stopped

volumes:
  seq-data:
