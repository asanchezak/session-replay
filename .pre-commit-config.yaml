repos:
  - repo: local
    hooks:
      - id: ruff-backend
        name: ruff (backend)
        entry: cd backend && uv run ruff check .
        language: system
        pass_filenames: false
      - id: tsc-extension
        name: typecheck (extension)
        entry: cd extension && npx tsc --noEmit
        language: system
        pass_filenames: false
      - id: tsc-frontend
        name: typecheck (frontend)
        entry: cd frontend && npx tsc --noEmit
        language: system
        pass_filenames: false
      - id: test-backend
        name: test (backend)
        entry: cd backend && uv run pytest tests/unit/ tests/integration/ -v -m "not postgres and not slow"
        language: system
        pass_filenames: false
      - id: test-extension
        name: test (extension)
        entry: cd extension && npx vitest run
        language: system
        pass_filenames: false
      - id: build-extension
        name: build (extension)
        entry: cd extension && npx vite build
        language: system
        pass_filenames: false
      - id: build-frontend
        name: build (frontend)
        entry: cd frontend && npx vite build
        language: system
        pass_filenames: false
