name: CI

on:
  push:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # Nightly — 02:00 UTC daily
    - cron: '0 4 * * 6'   # Weekly — Sat 04:00 UTC

env:
  CI: "true"

jobs:
  # ═══════════════════════════════════════════════════════
  # Fast lane — every push to any branch
  # ═══════════════════════════════════════════════════════

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .

  lint-js:
    strategy:
      matrix:
        project: [extension, frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  test-backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/unit/ -v

  test-js-unit:
    strategy:
      matrix:
        project: [extension, frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - run: npm ci
      - run: npx vitest run

  # ═══════════════════════════════════════════════════════
  # PR lane — pull_request to main (all of fast + below)
  # ═══════════════════════════════════════════════════════

  test-backend-integration:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/integration/ -v -m "not postgres and not slow"

  test-backend-scenarios:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/scenarios/ -v -m "not postgres and not slow"

  test-frontend-e2e:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Install xvfb
        run: sudo apt-get install -y xvfb
      - name: Start dev server
        run: |
          npx vite --host 0.0.0.0 > /tmp/vite.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:5173 2>/dev/null; then
              echo "✓ Vite ready on localhost:5173"
              break
            fi
            sleep 2
          done
      - name: Run frontend E2E tests
        run: xvfb-run npx playwright test
        env:
          SKIP_WEBSERVER: "true"
      - name: Show dev server logs
        if: failure()
        run: cat /tmp/vite.log

  coverage:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest --cov=. --cov-report=term-missing --cov-report=html --cov-fail-under=60
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: backend/htmlcov/

  # ═══════════════════════════════════════════════════════
  # Nightly — 02:00 UTC daily (all of PR + below)
  # ═══════════════════════════════════════════════════════

  test-postgres:
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/integration/test_migrations_round_trip.py -v

  test-extension-e2e:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Build extension
        run: npx vite build
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Install xvfb
        run: sudo apt-get install -y xvfb
      - name: Run extension E2E tests
        run: xvfb-run npx playwright test e2e/

  # ═══════════════════════════════════════════════════════
  # Weekly — Sat 04:00 UTC (all of nightly + below)
  # ═══════════════════════════════════════════════════════

  test-chaos:
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 6'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Build extension
        run: npx vite build
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Install xvfb
        run: sudo apt-get install -y xvfb
      - name: Run chaos test (S50)
        run: xvfb-run npx playwright test e2e/scenarios/s50_chaos_sw_kill_plus_network_drop.spec.ts

  test-real-ai:
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 6'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run real AI tests
        run: uv run pytest tests/integration/test_ai_provider_failures.py -v -m "real_ai"
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
