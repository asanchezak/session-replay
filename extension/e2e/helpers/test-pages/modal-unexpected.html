<!doctype html>
<html>
<head><title>Unexpected modal (S26)</title></head>
<body>
  <button id="trigger" onclick="document.getElementById('m').style.display='block'">Open</button>
  <div id="m" role="dialog" aria-modal="true" style="display:block; padding:24px; border:1px solid #000">
    <p>Are you sure?</p>
    <button id="accept">OK</button>
    <button id="cancel">Cancel</button>
  </div>
</body>
</html>
