<!DOCTYPE html>
<html>
<head>
<title>Mock Google search results</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .result { padding: 8px 0; border-bottom: 1px solid #eee; }
  a { color: #1a0dab; text-decoration: none; font-size: 18px; }
  .url { color: #006621; font-size: 14px; }
  .desc { color: #545454; font-size: 13px; }
  #status { padding: 12px; background: #d4edda; margin-top: 20px; display: none; }
</style>
</head>
<body>
  <h1>Search results for "indeed.com"</h1>
  <!-- Note: the id changes on every page load to simulate Google's behavior -->
  <div class="result">
    <a id="_RANDOM_SESSION_ID_HERE" href="https://www.indeed.com" data-action="open-indeed">
      <h3>Indeed: Job Search</h3>
    </a>
    <div class="url">https://www.indeed.com</div>
    <div class="desc">The world's largest job site.</div>
  </div>
  <div class="result">
    <a id="_OTHER_RANDOM_ID" href="https://example.com">
      <h3>Some unrelated result</h3>
    </a>
  </div>
  <div id="status">Indeed link clicked!</div>
  <script>
    // Randomize the id on load to simulate session-specific Google ids
    document.querySelector('[data-action="open-indeed"]').id =
      '_' + Math.random().toString(36).slice(2, 22) + '_' + Math.floor(Math.random() * 100);

    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        if (a.dataset.action === 'open-indeed') {
          document.getElementById('status').style.display = 'block';
          document.body.setAttribute('data-clicked-indeed', '1');
        }
      });
    });
  </script>
</body>
</html>
