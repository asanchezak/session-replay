<!doctype html>
<html>
<head><title>Shadow DOM target (S14)</title></head>
<body>
  <my-button id="host" aria-label="Submit"></my-button>
  <pre id="clicked"></pre>
  <script>
    class MyButton extends HTMLElement {
      constructor() {
        super();
        const root = this.attachShadow({ mode: "open" });
        const btn = document.createElement("button");
        btn.id = "inner";
        btn.textContent = this.getAttribute("aria-label") || "Click";
        btn.onclick = () => {
          document.getElementById("clicked").textContent = "yes";
        };
        root.appendChild(btn);
      }
    }
    customElements.define("my-button", MyButton);
  </script>
</body>
</html>
