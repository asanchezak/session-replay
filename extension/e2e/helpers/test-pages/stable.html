<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stable DOM fixture (S09)</title>
</head>
<body>
  <h1 id="title">Stable Page</h1>
  <form id="form" onsubmit="event.preventDefault(); document.getElementById('result').textContent = document.getElementById('q').value;">
    <input id="q" name="q" type="text" />
    <select id="loc" name="loc">
      <option value="ny">New York</option>
      <option value="rem">Remote</option>
    </select>
    <button type="submit" id="submit" aria-label="Submit search">Search</button>
  </form>
  <ul id="results">
    <li data-testid="r1">First</li>
    <li data-testid="r2">Second</li>
    <li data-testid="r3">Third</li>
  </ul>
  <div id="result"></div>
</body>
</html>
